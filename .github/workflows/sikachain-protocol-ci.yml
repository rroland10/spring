name: SikaChain protocol (SIKACHAIN=ON)

on:
  pull_request:
    paths:
      - "libraries/chain/**"
      - "libraries/testing/**"
      - "programs/cleos/**"
      - "plugins/chain_plugin/**"
      - "unittests/**"
      - "tests/test_chain_plugin.cpp"
      - "CMakeLists.txt"
  push:
    branches:
      - sikaio-protocol
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git \
            libcurl4-openssl-dev libgmp-dev zlib1g-dev zstd \
            llvm-11-dev

      - name: Configure (SIKACHAIN=ON)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSIKACHAIN=ON \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-11 \
            -GNinja

      - name: Build cleos + unit test libs
        run: |
          cmake --build build --target cleos eosio_chain_wrap eosio_testing -j "$(nproc)"

      - name: Run parallel unit tests
        run: |
          cd build
          ctest -LE _tests -j "$(nproc)" --output-on-failure
