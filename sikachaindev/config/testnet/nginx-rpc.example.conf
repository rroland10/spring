# TLS reverse proxy for testnet nodeos RPC + optional Hyperion
# Place behind certbot / ACM. Replace hostnames.

upstream sikachain_nodeos {
    server 127.0.0.1:8888;
    keepalive 32;
}

upstream sikachain_hyperion {
    server 127.0.0.1:7001;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name rpc.testnet.sikachain.gh;

    # ssl_certificate     /etc/letsencrypt/live/rpc.testnet.sikachain.gh/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/rpc.testnet.sikachain.gh/privkey.pem;

    location / {
        proxy_pass http://sikachain_nodeos;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 443 ssl http2;
    server_name hyperion.testnet.sikachain.gh;

    location / {
        proxy_pass http://sikachain_hyperion;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
