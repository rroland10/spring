# SikaChain testnet block producer — copy to host config-dir/config.ini
# Build nodeos from rroland10/spring tag sikachain-dev-sika-v2 (-DSIKACHAIN=ON)
#
# Replace:
#   PRODUCER_NAME     — BP account (e.g. sikabpa)
#   SIGNATURE_PROVIDER — PUB=KEY:PVT for block signing
#   P2P_*             — public hostname / ports for peer mesh
#   HTTP_*            — bind 127.0.0.1 behind TLS reverse proxy for RPC

enable-stale-production = false
production-pause-vote-timeout-ms = 0
producer-name = PRODUCER_NAME
signature-provider = SIGNATURE_PROVIDER

# Internal bind; terminate TLS at nginx/Caddy/ALB
http-server-address = 127.0.0.1:8888
p2p-listen-endpoint = 0.0.0.0:9876
p2p-server-address = bp1.testnet.sikachain.gh:9876
p2p-max-nodes-per-host = 16
max-clients = 25
agent-name = sikachain-testnet-bp1

# Mesh peers (one line per peer)
# p2p-peer-address = bp2.testnet.sikachain.gh:9876
# p2p-peer-address = bp3.testnet.sikachain.gh:9876

plugin = eosio::chain_plugin
plugin = eosio::producer_plugin
plugin = eosio::http_plugin
plugin = eosio::net_plugin
plugin = eosio::chain_api_plugin
plugin = eosio::producer_api_plugin
plugin = eosio::net_api_plugin

# Wallet / browser clients (restrict origin in production if using a same-origin API proxy)
access-control-allow-origin = https://app.sikachain.gh
access-control-allow-headers = Content-Type,Accept,Authorization,X-Requested-With
access-control-allow-credentials = true
http-validate-host = true

# SHIP → Hyperion (enable on at least one producer; often BP1 + dedicated history node)
plugin = eosio::state_history_plugin
disable-replay-opts = true
trace-history = true
chain-state-history = true
finality-data-history = true
state-history-endpoint = 127.0.0.1:8080

# Savanna / IF (adjust paths per host)
# genesis-state-file = /var/lib/sikachain/genesis.json
