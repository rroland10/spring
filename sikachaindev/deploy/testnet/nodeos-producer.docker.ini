# Runtime config for containerized testnet BP (envsubst at container start)
# See deploy/testnet/entrypoint.sh

enable-stale-production = ${ENABLE_STALE_PRODUCTION}
production-pause-vote-timeout-ms = 0
max-transaction-time = ${MAX_TRANSACTION_TIME_MS}
abi-serializer-max-time-ms = ${ABI_SERIALIZER_MAX_TIME_MS}
http-max-response-time-ms = ${HTTP_MAX_RESPONSE_TIME_MS}
producer-name = ${PRODUCER_NAME}
signature-provider = ${SIGNATURE_PROVIDER}

http-server-address = 0.0.0.0:8888
p2p-listen-endpoint = 0.0.0.0:9876
p2p-server-address = ${P2P_ADVERTISE}
p2p-max-nodes-per-host = ${P2P_MAX_PER_HOST}
max-clients = 25
agent-name = ${AGENT_NAME}

${P2P_PEER_LINES}

plugin = eosio::chain_plugin
wasm-runtime = eos-vm
plugin = eosio::producer_plugin
plugin = eosio::http_plugin
plugin = eosio::net_plugin
plugin = eosio::chain_api_plugin
plugin = eosio::producer_api_plugin
plugin = eosio::net_api_plugin

access-control-allow-origin = ${CORS_ORIGIN}
access-control-allow-headers = Content-Type,Accept,Authorization,X-Requested-With
access-control-allow-credentials = true
http-validate-host = ${HTTP_VALIDATE_HOST}

plugin = eosio::state_history_plugin
disable-replay-opts = true
trace-history = true
chain-state-history = true
finality-data-history = true
state-history-endpoint = 0.0.0.0:8080
